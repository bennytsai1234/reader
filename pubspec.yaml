name: legado_reader
description: "An iOS novel reader inspired by Legado"
publish_to: 'none'
version: 0.1.5+5

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # === State Management ===
  provider: ^6.1.2
  event_bus: ^2.0.0

  # === Network ===
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.2
  cookie_jar: ^4.0.8
  convert: ^3.1.1

  # === Database ===
  drift: ^2.22.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.0
  path: ^1.9.0
  path_provider: ^2.1.5

  # === Scanner ===
  mobile_scanner: ^7.2.0

  # === Media / Audio ===
  just_audio: ^0.10.5
  audio_session: ^0.2.2
  audio_service: ^0.18.18

  # === HTML Parsing (replaces Android Jsoup) ===
  html: ^0.15.5
  html_unescape: ^2.0.0
  csslib: ^1.0.0
  xml: ^6.5.0
  characters: ^1.3.0

  # === JSON Path ===
  json_path: ^0.7.4

  # === XPath ===
  xpath_selector: ^3.0.2
  xpath_selector_html_parser: ^3.0.1

  # === JavaScript Engine (replaces Android Rhino) ===
  flutter_js: ^0.8.3

  # === Crypto (replaces Android hutool-crypto) ===
  crypto: ^3.0.6
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # === Image Loading ===
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  flutter_widget_from_html: ^0.16.1

  # === Image Picker ===
  image_picker: ^1.1.2

  # === Deep Link & Sharing ===
  app_links: ^6.4.1
  receive_sharing_intent: ^1.1.1

  # === Web Server (replaces Android NanoHTTPD) ===
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_static: ^1.1.2
  network_info_plus: ^7.0.0

  # === Background Tasks ===

  workmanager: ^0.7.0
  pool: ^1.5.2

  # === Local File Support ===
  file_picker: ^10.3.10

  # === URL Launcher ===
  url_launcher: ^6.3.1

  # === Share ===
  share_plus: ^12.0.1

  # === WebView (for WebView book sources) ===
  webview_flutter: ^4.13.0

  # === Local Storage (key-value) ===
  shared_preferences: ^2.3.4
  package_info_plus: ^9.0.0
  home_widget: ^0.9.0

  # === UUID ===
  uuid: ^4.5.1

  # === Intl (date formatting, etc.) ===
  intl: ^0.20.2
  fast_gbk: ^1.0.0
  flutter_open_chinese_convert: ^0.9.0
  flutter_tts: ^4.2.5
  webdav_client: ^1.2.2
  archive: ^3.4.0
  webview_flutter_wkwebview: ^3.23.0
  webview_flutter_android: ^4.10.1
  epubx: ^4.0.0
  synchronized: ^3.3.1
  get_it: ^9.2.1
  logger: ^2.6.2
  scrollable_positioned_list: ^0.3.8


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  build_runner: ^2.4.13
  drift_dev: ^2.22.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/18PlusList.txt
    - assets/default_sources/
    - assets/fonts/
    - assets/web/

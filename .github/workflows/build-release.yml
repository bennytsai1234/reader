name: Build Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  inject-version:
    name: Inject Version from Tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject version into pubspec.yaml
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD="${{ github.run_number }}"
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          echo "Injected version: ${VERSION}+${BUILD}"
          grep "^version:" pubspec.yaml
          grep -q "^version: ${VERSION}+${BUILD}" pubspec.yaml || { echo "Version injection failed"; exit 1; }

      - name: Commit version bump
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD="${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git diff --cached --quiet || git commit -m "chore: bump version to ${VERSION}+${BUILD} [skip ci]"
          git push origin HEAD:refs/heads/main

      - name: Upload pubspec artifact
        uses: actions/upload-artifact@v4
        with:
          name: pubspec-yaml
          path: pubspec.yaml

  android-release:
    name: Android Release APK
    needs: inject-version
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download injected pubspec
        uses: actions/download-artifact@v4
        with:
          name: pubspec-yaml
          path: .

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ] || \
             [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || \
             [ -z "${ANDROID_KEY_ALIAS}" ] || \
             [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            echo "::error::Missing Android signing secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
            exit 1
          fi
          KEYSTORE_PATH="${RUNNER_TEMP}/android-release.keystore"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
          echo "ANDROID_KEYSTORE_PATH=${KEYSTORE_PATH}" >> "${GITHUB_ENV}"

      - name: Build Android release APK (split per ABI)
        run: flutter build apk --split-per-abi --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk

  ios-unsigned:
    name: iOS Unsigned Build
    needs: inject-version
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download injected pubspec
        uses: actions/download-artifact@v4
        with:
          name: pubspec-yaml
          path: .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ios/Podfile.lock
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: ${{ runner.os }}-pods-${{ hashFiles('pubspec.lock', 'ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: |
          for i in 1 2 3; do
            pod install && exit 0
            echo "pod install failed (attempt $i), retrying in 15s..."
            sleep 15
          done
          echo "pod install failed after 3 attempts"
          exit 1

      - name: Build iOS without codesign
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA for AltStore
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r inkpage-ios-unsigned.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/ipa/inkpage-ios-unsigned.ipa

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - android-release
      - ios-unsigned
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for release notes
        id: notes
        run: |
          NOTES_FILE="release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "has_notes=true" >> $GITHUB_OUTPUT
            echo "notes_file=$NOTES_FILE" >> $GITHUB_OUTPUT
          else
            echo "has_notes=false" >> $GITHUB_OUTPUT
          fi

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: dist

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: dist

      - name: Publish GitHub release (with release notes)
        if: steps.notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/app-arm64-v8a-release.apk
            dist/app-armeabi-v7a-release.apk
            dist/app-x86_64-release.apk
            dist/inkpage-ios-unsigned.ipa
          body_path: ${{ steps.notes.outputs.notes_file }}

      - name: Publish GitHub release (auto notes)
        if: steps.notes.outputs.has_notes == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/app-arm64-v8a-release.apk
            dist/app-armeabi-v7a-release.apk
            dist/app-x86_64-release.apk
            dist/inkpage-ios-unsigned.ipa
          generate_release_notes: true

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legado Reader Web 管理介面</title>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .btn { background: #007aff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn:hover { background: #0056b3; }
        #logs { background: #222; color: #00ff00; padding: 15px; border-radius: 6px; height: 300px; overflow-y: scroll; font-family: monospace; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Legado Reader Web</h1>
        <p>目前狀態：連線成功</p>
        
        <div class="card">
            <h3>📖 書源管理</h3>
            <button class="btn" onclick="fetchSources()">獲取所有書源</button>
            <div id="sourceList" style="margin-top:10px;"></div>
        </div>

        <div class="card">
            <h3>📡 實時調試日誌 (WebSocket)</h3>
            <div id="logs">等待日誌推送...</div>
        </div>
    </div>

    <script>
        const logDiv = document.getElementById('logs');
        const ws = new WebSocket(`ws://${window.location.host}/ws`);

        ws.onmessage = function(event) {
            const msg = JSON.parse(event.data);
            if (msg.type === 'sourceDebug') {
                const log = msg.data;
                const p = document.createElement('p');
                p.style.margin = '2px 0';
                p.textContent = `${log.formattedTime} ${log.message}`;
                logDiv.appendChild(p);
                logDiv.scrollTop = logDiv.scrollHeight;
            }
        };

        async function fetchSources() {
            const resp = await fetch('/getSources');
            const data = await resp.json();
            const list = document.getElementById('sourceList');
            list.innerHTML = `<p>目前共有 ${data.length} 個書源</p>`;
        }
    </script>
</body>
</html>
